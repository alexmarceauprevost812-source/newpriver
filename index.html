<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau Rivière</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
text-align:center;
}

h1{
color:orange;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:orange;
color:white;
font-weight:bold;
}

input{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:#222;
color:white;
}
</style>

</head>
<body>

<div class="box">

<h1>Nouveau Rivière</h1>

<p>Bienvenue Alex</p>

<button>Connexion</button>
<button>Inscription</button>

<input placeholder="Écris ton message">

<button>Envoyer</button>

</div>

</body>
</html>
